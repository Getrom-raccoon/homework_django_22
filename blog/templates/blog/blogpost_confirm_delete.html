{% extends 'catalog/base.html' %}

{% block title %}Удаление статьи{% endblock %}

{% block content %}
<div class="container">
    <div class="row">
        <div class="col-6 mx-auto">
            <div class="card">
                <div class="card-header">
                    <h3>Подтверждение удаления</h3>
                </div>
                <div class="card-body">
                    <p>Вы уверены, что хотите удалить статью "{{ object.title }}"?</p>
                    <p class="text-danger">Это действие нельзя отменить!</p>
                    
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">Удалить</button>
                        <a href="{% url 'blog:blogpost_detail' object.pk %}" class="btn btn-secondary">Отмена</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
